<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="FullVahti">
  <!-- navy tile -->
  <rect x="4" y="4" width="88" height="88" rx="20" fill="#2D2440"/>
  <!-- bracket "gate" (shared -vahti motif), indigo accent -->
  <g fill="none" stroke="#5566B5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M34 26 H25 V70 H34"/>
    <path d="M62 26 H71 V70 H62"/>
  </g>
  <!-- glyph: full-text document being fetched, lilac -->
  <g fill="#C5B8E8">
    <rect x="39" y="27" width="18" height="22" rx="2.5"/>
  </g>
  <!-- text lines (cut into the page) -->
  <g fill="#2D2440">
    <rect x="42" y="32" width="12" height="2.4" rx="1.2"/>
    <rect x="42" y="37" width="12" height="2.4" rx="1.2"/>
    <rect x="42" y="42" width="8"  height="2.4" rx="1.2"/>
  </g>
  <!-- download arrow + shelf: "find &amp; attach the PDF", lilac -->
  <g fill="none" stroke="#C5B8E8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M48 53 V62"/>
    <path d="M43 58 L48 63 L53 58"/>
    <path d="M40 68 H56"/>
  </g>
</svg>

name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version matches tag
        run: |
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "manifest.json version ($MANIFEST_VERSION) != tag ($TAG_VERSION)" >&2
            exit 1
          fi

      - name: Build XPI
        run: |
          mkdir -p dist
          zip dist/fullvahti-${GITHUB_REF_NAME#v}.xpi \
            manifest.json bootstrap.js fullvahti.js \
            preferences.xhtml preferences.js prefs.js icon.svg LICENSE NOTICE

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.xpi
          generate_release_notes: true

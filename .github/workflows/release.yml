name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Only ever publish from a real version tag (v*) or a manual run on main —
    # never from an arbitrary branch a dispatch happens to target.
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and tag
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=v$VERSION" >> "$GITHUB_ENV"
          # On a tag push, the pushed tag must match manifest.json.
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$GITHUB_REF_NAME" != "v$VERSION" ]; then
            echo "manifest.json version ($VERSION) != tag ($GITHUB_REF_NAME)" >&2
            exit 1
          fi

      - name: Refuse to overwrite an existing release
        # An auto-updating XPI must be immutable: a published version is never
        # rebuilt or replaced. Bump manifest.json to ship again.
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — releases are immutable. Bump the version in manifest.json." >&2
            exit 1
          fi

      - name: Build XPI
        run: |
          mkdir -p dist
          zip dist/fullvahti-${VERSION}.xpi \
            manifest.json bootstrap.js fullvahti.js \
            preferences.xhtml preferences.js prefs.js icon.svg LICENSE NOTICE

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: dist/*.xpi
          fail_on_unmatched_files: true
          generate_release_notes: true
